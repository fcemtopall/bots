version: '3.8'

services:
  redis:
    image: redis:alpine
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M # OOM koruması

  bot-engine:
    build: .
    restart: always
    env_file: .env
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          cpus: '1.0' # İşlemci boğulma koruması
          memory: 1G  # t3.small için maksimum güvenli RAM sınırı
    logging:
      driver: "json-file"
      options:
        max-size: "10m" # IOPS disk şişme koruması
        max-file: "3"